# =============================================================================
# Hospital Readmission Risk — Central Configuration
# Dataset: hospital_readmission_risk_dataset_2026_v1_18000rows.csv
# Rows: 18,000 | Columns: 25 | Positive rate: ~74%
# =============================================================================

paths:
  raw_data:       "data/raw/hospital_readmission_risk_dataset_2026_v1_18000rows.csv"
  cleaned_data:   "data/processed/cleaned.csv"
  features_data:  "data/processed/readmission_features.csv"
  model_dir:      "models/"
  figures_dir:    "reports/figures/"
  metrics_out:    "data/processed/metrics_summary.csv"

random_seed: 42

# ---------------------------------------------------------------------------
# Data preparation
# ---------------------------------------------------------------------------
data:
  target_column: "Readmitted_Within_30_Days"
  test_size: 0.20
  val_size: 0.20        # fraction of TOTAL data used for validation
  stratify: true

  # Columns to drop before modelling (IDs, free-text, leakage, etc.)
  drop_columns: []

  # Categorical columns to one-hot encode.
  categorical_columns:
    - "Gender"
    - "Insurance_Type"
    - "Admission_Type"
    - "Primary_Diagnosis_Group"
    - "Discharge_Disposition"

  # Imputation strategies (safety net even if dataset has no NAs)
  numeric_impute_strategy: "median"
  categorical_impute_value: "Unknown"

  # Clip physically-impossible numeric values: {col: [min, max]}  null = no bound
  clip_values:
    Creatinine_Level: [0.0, null]

# ---------------------------------------------------------------------------
# Feature engineering
# ---------------------------------------------------------------------------
features:
  age_bins: [0, 40, 65, 80, 120]
  age_labels: ["<40", "40-64", "65-79", "80+"]

  age_col: "Age"
  comorbidity_cols: []           # empty → Comorbidity_Index used directly
  prior_admissions_col: "Previous_Admissions_6M"
  discharge_disposition_col: "Discharge_Disposition"

# ---------------------------------------------------------------------------
# Modeling
# ---------------------------------------------------------------------------
model:
  # ---- Leakage / exclusion -----------------------------------------------
  # These columns are POST-DISCHARGE observations not available at prediction time.
  # Flagged for exclusion during modeling. Comment out to include them.
  exclude_columns:
    - "Followup_Appointment_Scheduled"   # decided after discharge
    - "Medication_Adherence_Score"        # measured post-discharge

  # Columns to watch for indirect leakage (kept in, but investigate):
  # - Time_Since_Last_Discharge  (may encode data-collection bias)
  # - Previous_Readmissions_1Y   (overlaps with target for re-admission events)

  # ---- Splits ------------------------------------------------------------
  cv_folds: 5

  # ---- Logistic Regression -----------------------------------------------
  logistic_regression:
    C: 1.0
    max_iter: 1000
    class_weight: "balanced"
    solver: "lbfgs"

  # ---- Random Forest -------------------------------------------------------
  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_leaf: 10
    class_weight: "balanced"
    n_jobs: -1

  # ---- Gradient Boosting (sklearn HistGradientBoosting / XGBoost fallback) -
  gradient_boosting:
    max_iter: 300          # sklearn HGBC uses max_iter; XGBoost uses n_estimators
    learning_rate: 0.05
    max_depth: 6
    min_samples_leaf: 20
    class_weight: "balanced"  # supported by sklearn HGBC >= 1.2
    # XGBoost-specific (used only if xgboost is installed):
    n_estimators: 300
    subsample: 0.8
    colsample_bytree: 0.8
    scale_pos_weight: 0.35   # neg/pos ratio: ~4651/13349

  # ---- Tuning scaffold (Phase 4) -----------------------------------------
  tuning:
    n_iter: 50
    cv_folds: 5
    scoring: "average_precision"   # PR-AUC — primary metric given class imbalance

  # ---- Calibration scaffold (Phase 4) ------------------------------------
  calibration:
    method: "isotonic"   # "isotonic" or "sigmoid"
    cv: 5
