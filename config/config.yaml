# =============================================================================
# Hospital Readmission Predictor — Central Configuration
# Dataset: hospital_readmissions.csv
# Rows: 25,000 | Columns: 17 | Target: readmitted (yes/no → 1/0)
# Positive rate: ~45.3% (nearly balanced)
# =============================================================================

paths:
  raw_data:      "data/raw/hospital_readmissions.csv"
  features_data: "data/processed/readmission_features.csv"
  analysis_features_data: "data/processed/readmission_features_raw.csv"
  features_metadata: "data/processed/features_metadata.json"
  model_dir:     "models/"
  figures_dir:   "reports/figures/"
  metrics_out:   "data/processed/metrics_summary.csv"
  metrics_tuned: "data/processed/metrics_tuned_summary.csv"

random_seed: 42
cache_version: 1

# ---------------------------------------------------------------------------
# Data preparation
# ---------------------------------------------------------------------------
data:
  target_column:        "readmitted"
  target_positive_value: "yes"   # mapped to 1; "no" → 0
  test_size:  0.20
  val_size:   0.20
  stratify:   true

  # Columns to drop before any processing
  drop_columns: []

  # Schema declaration — used for validation in _validate()
  required_columns:
    - "age"
    - "time_in_hospital"
    - "n_lab_procedures"
    - "n_procedures"
    - "n_medications"
    - "n_outpatient"
    - "n_inpatient"
    - "n_emergency"
    - "medical_specialty"
    - "diag_1"
    - "diag_2"
    - "diag_3"
    - "glucose_test"
    - "A1Ctest"
    - "change"
    - "diabetes_med"
    - "readmitted"

  categorical_columns:
    - "medical_specialty"
    - "diag_1"
    - "diag_2"
    - "diag_3"
    - "glucose_test"
    - "A1Ctest"
    - "change"
    - "diabetes_med"

  numeric_impute_strategy: "median"

# ---------------------------------------------------------------------------
# Feature engineering
# ---------------------------------------------------------------------------
features:
  # Age bracket → ordinal integer (ordered, appropriate for LR)
  age_brackets:
    "[40-50)": 1
    "[50-60)": 2
    "[60-70)": 3
    "[70-80)": 4
    "[80-90)": 5
    "[90-100)": 6

  # Binary flags for any prior utilization
  prior_utilization_cols:
    - "n_inpatient"
    - "n_emergency"

  # medical_specialty "Missing" sentinel value
  specialty_missing_value: "Missing"

  # Interaction terms — both columns must be numeric at the time of creation
  interactions:
    enabled: true
    terms:
      - ["n_inpatient",   "time_in_hospital"]
      - ["n_medications", "time_in_hospital"]

# ---------------------------------------------------------------------------
# Modeling
# ---------------------------------------------------------------------------
model:
  # No leakage exclusions needed for this dataset
  exclude_columns: []

  # After OHE with drop_first=True, reference categories are already removed.
  # Populate once encoding output is confirmed.
  drop_redundant_cols: []

  cv_folds: 5   # used by cross_validate_model(); keep in sync with tuning.cv_folds

  # ---- Logistic Regression (wrapped in StandardScaler Pipeline) -----------
  logistic_regression:
    C:            1.0
    max_iter:     1000
    class_weight: "balanced"
    solver:       "lbfgs"
    penalty:      "l2"

  # ---- Random Forest -------------------------------------------------------
  random_forest:
    n_estimators:     200
    max_depth:        null
    min_samples_leaf: 10
    class_weight:     "balanced"
    n_jobs:           -1

  # ---- Gradient Boosting (sklearn HistGradientBoostingClassifier) ----------
  # XGBoost / LightGBM are NOT dependencies.
  gradient_boosting:
    max_iter:         200
    learning_rate:    0.05
    max_depth:        5
    min_samples_leaf: 20
    class_weight:     "balanced"

  # ---- Hyperparameter tuning ----------------------------------------------
  tuning:
    n_iter:        20
    cv_folds:      5   # used by tune_model(); keep in sync with model.cv_folds
    scoring:       "roc_auc"

    param_spaces:
      LogisticRegression:
        classifier__C:       [0.001, 0.01, 0.1, 0.5, 1.0, 5.0, 10.0]
        classifier__penalty: ["l1", "l2"]
        classifier__solver:  ["liblinear", "saga"]

      RandomForest:
        n_estimators:      [100, 200, 300]
        max_depth:         [5, 10, 15, null]
        min_samples_split: [2, 5, 10]
        min_samples_leaf:  [5, 10, 20]

      GradientBoosting:
        learning_rate:    [0.01, 0.05, 0.1, 0.2]
        max_iter:         [100, 150, 200, 300]
        max_depth:        [3, 4, 5, 6]
        min_samples_leaf: [10, 20, 30, 50]

  # ---- Calibration --------------------------------------------------------
  calibration:
    methods: ["sigmoid", "isotonic"]

  # ---- Threshold analysis -------------------------------------------------
  threshold:
    optimize_by:   "recall"    # find max-precision threshold at recall >= recall_target
    recall_target: 0.80
    sweep_min:     0.05
    sweep_max:     0.95
    sweep_step:    0.05
