# =============================================================================
# Hospital Readmission Risk — Central Configuration
# Dataset: hospital_readmission_risk_dataset_2026_v1_18000rows.csv
# Rows: 18,000 | Columns: 25 | Positive rate: ~74%
# =============================================================================

paths:
  raw_data:       "data/raw/hospital_readmission_risk_dataset_2026_v1_18000rows.csv"
  cleaned_data:   "data/processed/cleaned.csv"
  features_data:  "data/processed/readmission_features.csv"
  model_dir:      "models/"
  figures_dir:    "reports/figures/"
  metrics_out:    "data/processed/metrics_summary.csv"
  metrics_tuned:  "data/processed/metrics_tuned_summary.csv"

random_seed: 42

# ---------------------------------------------------------------------------
# Data preparation
# ---------------------------------------------------------------------------
data:
  target_column: "Readmitted_Within_30_Days"
  test_size: 0.20
  val_size:  0.20
  stratify:  true

  drop_columns: []

  categorical_columns:
    - "Gender"
    - "Insurance_Type"
    - "Admission_Type"
    - "Primary_Diagnosis_Group"
    - "Discharge_Disposition"

  numeric_impute_strategy: "median"
  categorical_impute_value: "Unknown"

  clip_values:
    Creatinine_Level: [0.0, null]

# ---------------------------------------------------------------------------
# Feature engineering
# ---------------------------------------------------------------------------
features:
  age_bins:   [0, 40, 65, 80, 120]
  age_labels: ["<40", "40-64", "65-79", "80+"]

  age_col:                  "Age"
  comorbidity_cols:         []
  prior_admissions_col:     "Previous_Admissions_6M"
  discharge_disposition_col: "Discharge_Disposition"

  # Optional interaction terms.
  # Each entry is [col_a, col_b] — creates col_a × col_b column.
  # Both columns must exist in the cleaned (pre-OHE) DataFrame.
  interactions:
    enabled: true
    terms:
      - ["Age",           "Comorbidity_Index"]
      - ["Severity_Score", "Length_of_Stay"]

# ---------------------------------------------------------------------------
# Modeling
# ---------------------------------------------------------------------------
model:
  # ---- Leakage exclusions (post-discharge observations) ------------------
  exclude_columns:
    - "Followup_Appointment_Scheduled"
    - "Medication_Adherence_Score"

  # ---- Redundant / collinear column removal --------------------------------
  # age_group_* OHE columns duplicate continuous Age.
  # discharge_disposition_cat_* is a coarser re-encoding of Discharge_Disposition_*.
  # These are dropped in load_features() before any model sees the data.
  drop_redundant_cols:
    - "age_group_<40"
    - "age_group_40-64"
    - "age_group_65-79"
    - "age_group_80+"
    - "discharge_disposition_cat_Facility"
    - "discharge_disposition_cat_Home"

  # ---- Splits & CV --------------------------------------------------------
  cv_folds: 5

  # ---- Logistic Regression (wrapped in StandardScaler Pipeline) -----------
  logistic_regression:
    C:            1.0
    max_iter:     1000
    class_weight: "balanced"
    solver:       "lbfgs"
    penalty:      "l2"

  # ---- Random Forest -------------------------------------------------------
  random_forest:
    n_estimators:    200
    max_depth:       null
    min_samples_leaf: 10
    class_weight:    "balanced"
    n_jobs:          -1

  # ---- Gradient Boosting (sklearn HGBC / XGBoost fallback) ----------------
  gradient_boosting:
    max_iter:         200
    learning_rate:    0.05
    max_depth:        6
    min_samples_leaf: 20
    class_weight:     "balanced"
    # XGBoost-specific (used if xgboost installed):
    n_estimators:     200
    subsample:        0.8
    colsample_bytree: 0.8
    scale_pos_weight: 0.35

  # ---- Hyperparameter tuning ----------------------------------------------
  tuning:
    n_iter:   20          # RandomizedSearchCV iterations
    cv_folds: 5
    scoring:  "roc_auc"   # roc_auc gives cleaner signal on this dataset

    # Parameter search spaces per model.
    # Pipeline-wrapped models use "classifier__" prefix for their params.
    param_spaces:
      LogisticRegression:
        classifier__C:       [0.001, 0.01, 0.1, 0.5, 1.0, 5.0, 10.0, 50.0]
        classifier__penalty: ["l1", "l2"]
        classifier__solver:  ["liblinear", "saga"]

      RandomForest:
        n_estimators:      [100, 150, 200, 300]
        max_depth:         [5, 10, 15, 20, null]
        min_samples_split: [2, 5, 10]
        min_samples_leaf:  [5, 10, 20]

      GradientBoosting:
        learning_rate:    [0.01, 0.05, 0.1, 0.2]
        max_iter:         [100, 150, 200, 300]
        max_depth:        [3, 4, 5, 6, 7]
        min_samples_leaf: [10, 20, 30, 50]

  # ---- Calibration --------------------------------------------------------
  calibration:
    methods: ["sigmoid", "isotonic"]   # both compared; best kept
    cv:      5

  # ---- Threshold analysis -------------------------------------------------
  threshold:
    sweep_min:      0.05
    sweep_max:      0.95
    sweep_step:     0.05
    optimize_by:    "f1"          # "f1" | "recall" | "precision"
    recall_target:  0.80          # minimum recall when optimize_by="recall"
